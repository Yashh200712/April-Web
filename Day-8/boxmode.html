<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(27, 5, 5);
            display: flex;
            display: contents;
            display: inline-flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .product {
            width: 300px;
            border: 1px solid black;
            text-align: center;
            margin: 20px;
            overflow: hidden;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0px 4px 8px rgba(244, 243, 243, 0.783);
            background-color: rgb(145, 61, 61);
            /* <!-- border-radius is the property that controls the roundness of the corners of an element -->*/
            /*  <!-- overflow is the property that controls what happens when content exceeds the boundaries of its container -->*/
        }

        .product img {
            height: 300px;
            width: 100%;
            object-fit: cover;
            /* <!-- object-fit is the property that controls how an element's content should be resized to fit its container -->*/
        }

        .product button {
            padding: 10px 20px;
            background-color: rgb(225, 227, 235);
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .product button:hover {
            background-color: rgb(255, 255, 255);
            color: rgb(52, 49, 154);
        }

        .product:hover {
            transform: scale(1.05);
        }

        button {
            background-color: rgb(177, 180, 189);
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>


</head>

<body>
    <!--padding means the space inside the 4 directions-->
