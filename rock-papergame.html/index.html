<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
</head>
<style>
    body{
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #070707;
        color: #fff;

    }
    .choice button{
        padding: 10px 20px;
        margin: 10px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
    }
    .rock{
        background-color: #ff4c4c;
        color: #fff;
        border:red;
        box-shadow: 0 0 10px red;
    }
    .paper{
        background-color: #4c9aff;
        color: #fff;
        border:blue;
        box-shadow: 0 0 10px blue;
    }
    .scissors{
        background-color: #4cff4c;
        color: #fff;
        border:green;
        box-shadow: 0 0 10px green;
    }
    .scoreboard{
        margin-top: 20px;
    }
    rock:hover, .paper:hover, .scissors:hover{
        opacity: 0.6;
    }
    #result{
        font-size: 24px;
        margin-top: 20px;
        color: gold;
    }
    #win-count, #loss-count, #draw-count{
        font-size: 18px;
        margin-left: 5px;
    }
    #win-count{
        color: #4cff4c;
    }
    #loss-count{
        color: #ff4c4c;
    }
    #draw-count{
        color: #777878;
    }
</style>
<body>
    <h1>Rock Paper Scissors Game</h1>

    <div class="choice">
        <button class="rock" onclick="playGame('rock')">Rock</button>
        <button class="paper" onclick="playGame('paper')">Paper</button>
        <button class="scissors" onclick="playGame('scissors')">Scissors</button>
    </div>

    <p id="result">Choose your option!</p>

    <div class="scoreboard">
        <p><strong>Scoreboard</strong></p>
        <p>Win<span id="win-count">0</span></p>
        <p>Loss<span id="loss-count">0</span></p>
        <p>Draw<span id="draw-count">0</span></p>
    </div>

    <script>
        let winCount = 0;
        let lossCount = 0;
        let drawCount = 0;

        function playGame(userChoice){
            const choices = ['rock','paper','scissors'];
            const computerChoice = choices[Math.floor(Math.random()* 3)]

            let resultMessage = '';
            //Logic for win, loss, draw
            if(userChoice === computerChoice){
                resultMessage = "It's a draw!";
                drawCount++;
            } else if(
                (userChoice === 'rock' && computerChoice === 'scissors') ||
                (userChoice === 'paper' && computerChoice === 'rock') ||
                (userChoice === 'scissors' && computerChoice === 'paper')
            ) {
                resultMessage = "You win!";
                winCount++;
            } else {
                resultMessage = "You lose!";
                lossCount++;
            }
            //Dom to connect html and js

            document.getElementById('result').innerHTML = resultMessage;
            document.getElementById('win-count').innerHTML = winCount;
            document.getElementById('loss-count').innerHTML = lossCount;
            document.getElementById('draw-count').innerHTML = drawCount;
        }
    </script>
</html>
