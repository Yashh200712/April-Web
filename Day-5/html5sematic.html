<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!-- Semantic HTML5 tags -->
    <header>
    <h1>Welcome to My Website</h1>
    <p>This is the header section of the webpage.</p>
    <div>
        <form>
            <label>
                <input> type="text" placeholder="Search...">
            </label>
        </form>
    </div>
    </header>
    <!-- header tag contains the header content -->

    <main>
        <!-- main tag contains the main content -->
         <h2>Main Content</h2>
        <p>This is the main content of the webpage.</p>
    </main>
    <footer>
        <h2>Footer</h2>
        <p>This is the footer section of the webpage.</p>

    </footer>
    <!-- footer tag contains the footer content -->
</body>
</html>
