<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!--Datalist tag is used to provide an autocomplete feature for an input field-->
    <label>choose your country</label>
    <input list="countries">

    <datalist id="countries">
        <option value="India">
        <option value="Iran">
        <option value="Italy">
        <option value="USA">
        <option value="UK">
        <option value="Australia">
    </datalist>

    <datalist id="Foods">
        <option value="Pizza">
        <option value="Burger">
        <option value="Pasta">
        <option value="Salad">
    </datalist>

</body>
</html>
