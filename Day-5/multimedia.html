<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--video mp4-->
    <video controls autoplay loop muted height="400" width="600">
        <source src=" https://www.pexels.com/download/video/33596416/ "  type="video/mp4">
       
    </video><!-- controls tag give controls for the video -->
    <!-- autoplay tag automatically play the video when the page loads -->
     <!-- loop tag make the video play in a loop -->
     <!-- muted tag mute the audio of the video -->
      <audio controls autoplay loop>
        <source src="./fassounds-escape-your-love-upbeat-fashion-pop-dance-412230.mp3" type="audio/mp3">
        <!-- ./ is used to find all the current directory files -->
      </audio>
      <!--audio tag gives audio controls -->
</body>
</html>
