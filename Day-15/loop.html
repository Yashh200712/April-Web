<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //++ incresase by 1
        //-- decrease by 1
        // Loop must be stopped otherwise it will run forever

        //for loop = one of the most used loop in programming
        //task: print 1 to 10
        for(let i=1; i<=10; i++){
         //body of the loop
            console.log( i);
        }

        // task: print 10 to 1
        for(let i=10; i>=1; i--){
            console.log("reversed", i);
        }

        //While loop-entry cantrolled loop
        //while loop start and check the condition first if it is true then only it will execute the body of the loop otherwise it will not execute the body of the loop
        //task: print 1 to 10
        let i = 1;
        while(i<=10){
            console.log("while loop" ,i)
            i++;
        }

        //do while loop-exit controlled loop
        //do while loop will execute the body of the loop at least once even if the condition
        //is false because in do while loop the body of the loop is executed first and then the condition is checked
        //task: print 1 to 10
        let j=1;
        do{
            console.log("Hello");
            j++;
        }while(j<=10)
    </script>
    
</body>
</html>
