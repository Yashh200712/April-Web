<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .product{
            background-color: blue;
            display:flex;
            justify-content: space-evenly;
            /*justify-content is used to align the item horizontally in the container. */
            height:400px;
        }
        .box{
            border : 1px solid black;
            width:100px;
            height:100px;
            text-align: center;
            background-color : lemonchiffon;
            font-family:cursive;
            font-weight: bold;

        }
    </style>
</head>
<body>
    <!--Flex display in 1 Dimension - Eith row or colum but bydefault it is row wise : side by side-->
    <div class="product">
        <div class="box">Cake</div>
        <div class="box">Bread</div>
        <div class="box">pastry</div>
    </div>
</body>
</html>
