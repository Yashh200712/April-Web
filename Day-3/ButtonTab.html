<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button>Home</button><!-- button tag is used to create a button -->
    <br>
    <button>About</button>
    <br>
    <button>Contact</button>
    <!-- button tag can be used to create buttons for navigation, form submission, and other interactive elements on a webpage -->
     <!-- button tag can also be used to create buttons with different styles and functionalities using CSS and JavaScript -->

       <!-- type attribute is used to specify the behavior of the button when it is clicked -->
        <!-- submit type is used to submit a form, reset type is used to reset a form, and button type is used for general purposes -->
</body>
