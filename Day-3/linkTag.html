<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--Link Tag-->
    <!-- an anchor tag is used to create a hyperlink to another webpage or a specific location within the same webpage -->
    <a href="https://www.amazon.com">Amazon</a>
    <br>
    <a href="https://www.flipkart.com">Flipkart</a>
    <br>
    <a href="https://www.myntra.com">Myntra</a>
    <!-- href attribute is used to specify the URL of the webpage that the link goes to -->
     <!-- href attribute can also be used to link to a specific location within the same webpage using an id selector -->
      <!-- for example, <a href="#section1">Section 1</a> will link to the element with id="section1" on the same webpage -->
       <!-- anchor tags can also be used to create email links using the mailto: protocol, such as <a href="mailto:-->
       <br>
       <a href="support.html">Support</a>
       <br>
       <button><a href="https://www.paytm.com">Paytm</a></button>
       <!-- anchor tags can be used inside buttons to create clickable buttons that link to other webpages -->
        <!-- however, it is generally not recommended to use anchor tags inside buttons for accessibility reasons, as it can cause confusion for users who rely on assistive technologies -->
         <!-- instead, it is better to use JavaScript to handle button clicks and navigate to the desired webpage -->
</body>
</html>
