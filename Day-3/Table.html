<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1" cellspacing="2" cellpadding="2" bgcolor="lightgray"><!-- table tag is used to create a table -->
        <!-- border="1" adds a border around the table and its cells -->
         <!-- cellspacing="2" adds space between the cells -->
         <!-- cellpadding="2" adds space between the cell content and the cell borders -->
        <!-- bgcolor="lightgray" sets the background color of the table to light gray -->
         
         <tr>
            <th>Name</th>
            <th>Age</th>
            <th>gender</th>
        </tr>

        <tr>
            <td>John Doe</td>
            <td>30</td>
            <td>Male</td>
        </tr>

        <tr>
            <td>Yash Tiwari</td>
            <td>19</td>
            <td>Male</td>
        </tr>
    </table>
</body>
</html>
