<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <select>
        <option>BreakFast</option><!-- option tag is used to create options in the drop down list -->
        <option>Lunch</option>
        <option>Dinner</option>
        <option selected>Snacks</option><!-- selected attribute is used to preselect an option in the drop down list -->
        <!-- selected attribute can only be used on one option in the drop down list -->
         <!-- if multiple options have the selected attribute, only the first one will be preselected -->
          <!-- selected attribute goes from down to up -->
           <option disabled>Drinks</option>
           <!-- disabled attribute is used to disable an option in the drop down list -->
            <!-- disabled attribute can be used on any option in the drop down list -->
             <!-- disabled attribute makes the option unselectable and grayed out -->
    </select>><!-- select tag is used to create a drop down list -->
</html>
<!-- ul tag and select tag are used to create lists and drop down menus respectively -->
 <!-- difference between list and drop down menu is that list is always visible while drop down menu is hidden until user clicks on it -->
