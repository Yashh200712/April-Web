<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <--Ordered List-->
    <ol type="A">
        <!-- type attribute is used to specify the type of numbering for the ordered list -->
         <!-- type attribute can take values such as A, a, I, i, 1, etc. -->
          <!-- A and a are used for uppercase and lowercase letters respectively, I and i are used for uppercase and lowercase Roman numerals respectively, and 1 is used for decimal numbers -->
           <!-- if type attribute is not specified, the default numbering is decimal numbers -->
        <li>HTML</li><!-- li tag is used to create list items in an ordered list -->
        <li>CSS</li>
        <li>JavaScript</li>
        
    </ol>
    <--Unordered List-->
    <ul type="square"  ><!-- type attribute is used to specify the type of bullet for the unordered list -->
        <!-- type attribute can take values such as disc, circle, square, etc. -->
         <!-- disc is used for filled circles, circle is used for hollow circles, and square is used for filled squares -->
          <!-- if type attribute is not specified, the default bullet is a filled circle (disc) -->
        <li>HTML</li><!-- li tag is used to create list items in an unordered list -->
        <li>CSS</li>
        <li>JavaScript</li> 
        
    </ul>
    <!-- ol tag is used to create an ordered list, which is a list of items that are numbered or lettered -->
     <!-- ul tag is used to create an unordered list, which is a list of items that are not numbered or lettered -->
      <!-- li tag is used to create list items in both ordered and unordered lists -->
       <!-- list items can contain text, images, links, and other HTML elements -->
        <!-- lists can be nested inside other lists to create sublists -->
         <!-- lists are commonly used for navigation menus, itemized information, and other types of content on webpages -->    

</body>
</html>
