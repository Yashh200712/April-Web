<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    button{
            color: wheat;
            background-color: black;
    }

    p{
        color: blue;
        font-size: large;
        text-align: center;
        font-family: cursive;
        background-color: rgb(22, 2, 2);
    }
    span{
        color: red;
        font-size: x-large;
        font-weight: bold;
    }
</style>
<body>
    <button>log in</button>

    <p> IPL match b/w teams <span>RCB</span> V/s <span>GT</span></p>
    <!-- we use span tag to style individual elements within a paragraph -->
</body>
</html>
