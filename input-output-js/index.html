<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
        // Input
        //A. prompt() - A function that shows a dialog with an optional message prompting the user to input some text. The function returns the text entered by the user, or null if the user canceled the input. 

         var username = prompt("Enter your username:");
         console.log("The username is: " , username);
         document.write("The username is: " , username);//output to the webpage

         //B. confirm("Message") - yes(true) or no(false)
            var isConfirmed = confirm("Do you want to proceed?");
            console.log("Is confirmed: " , isConfirmed);
            document.write("Is confirmed: " , isConfirmed);//output to the webpage  
            </script>
</body>
</html>
