<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            color: red;
            background-color: yellow;
        }
        div:hover{
            color: rgb(180, 180, 232);
            background-color: lightblue;
        }
        /*<!-- div:hover is used to change the color of the div when we hover over it -->*/
        div p{
            color: blue;
        }
        p{
            color: green;
        }
    </style>
</head>
<body>
    <div>
        <h2>yash</h2>
        <p>this is a paragraph</p>
    </div>
    <p>this is a paragraph 2</p>
</body>
</html>
