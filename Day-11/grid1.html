<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .Product{
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 10px;
            background-color: lightgray;            
        }
        .BOX{
            background-color: lightblue;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div class="Product">  
        <div class="BOX">CAKE</div>
        <div class="BOX">BREAD</div>
        <div class="BOX">CROISSANT</div>
        <div class="BOX">MUFFIN</div>   
        <div class="BOX">Price</div>
    </div>
</body>
</html>
