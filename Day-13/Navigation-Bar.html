<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        background-color: lightgray;
        font-family: Arial, sans-serif;
        padding: 20px;
    }
    .navigation{
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #333;
        padding: 10px 20px;
        color: white;
    }
    .nav-links a{
        color: rgba(255, 255, 255, 0.642);
        text-decoration: underline;
        margin-left: 15px;
    }
    .nav-links a:hover{
        color: white;
    }
    .login-form{
        background-color: white;
        padding: 20px;
        border-radius: 5px;
        width: 300px;
        margin: auto;
        margin-top: 20px;
    }
    .login-form input{
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    .login-form button{
        width: 100%;
        padding: 10px;
        border: none;
        background-color: #007bff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }
    button{
        padding: 10px 20px;
        border: none;
        background-color: #007bff;
        color: rgba(18, 9, 9, 0.804);
        border-radius: 5px;
        cursor: pointer;
    }
    .button:hover{
        background-color: #0056b3;
    }
</style>
<body>
    <nav class="navigation">
        <div class="logo">MyWebsite</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Blog</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>
    </nav>
    <form class="login-form">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</body>
</html>
