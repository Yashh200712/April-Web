<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .ball{
        width: 50px;
        height: 50px;
        background-color: red;
        border-radius: 50%;
        animation: bounce 2s infinite alternate;
    }

    @keyframes bounce {
        0% {
            opacity: 1;
             background-color: red;
        }
        50% {
            opacity: 0;
            background-color: blue;
        }
        100% {
            opacity: 1;
            background-color: green;
        }
    }
</style>
<body>
    <div class="ball"></div>
</body>
</html>
