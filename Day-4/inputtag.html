<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Username:</label>
    <!-- label tag is used to create labels for input fields in a form -->
    <input placeholder="Enter your username">
    <!-- input tag is used to create input fields in a form -->
     <!-- placeholder attribute is used to provide a hint to the user about what to enter in the input field -->
      <label>Email:</label>
      <input type="email"   placeholder="Enter your email">

      <label>Password:</label>
      <input type="password" placeholder="Enter your password">

      <label>Age:</label>
      <input type="number" placeholder="Enter your age">

      <label>Resume:</label>
      <input type ="file">
      <!-- type attribute is used to specify the type of input field -->

      <label>D.O.B:</label>
      <input type="date" placeholder="Enter your date of birth">

      <input type="checkbox"> Terms and Conditions
      <!-- checkbox input type is used to create a checkbox that allows the user to select one or -->

      <textarea cols="30" rows="10" placeholder="Enter your message"></textarea>
      <!-- textarea tag is used to create a multi-line input field for text -->
</body>
</html> <!-- more options from a set of choices -->
